# ── Sample Dataset Config (for quick verification) ───────────────────────────
dataset: thesis_sample
data_path: data

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp

load_col:
  inter: [user_id, item_id, timestamp, watch_time]

user_inter_num_interval: "[5, inf)"
item_inter_num_interval: "[1, inf)"

eval_args:
  split: {LS: valid_and_test}
  order: TO
  group_by: user
  mode: full

metrics: [Recall, NDCG, MRR, Hit]
topk: [5, 10, 20]
valid_metric: NDCG@10

# Fast settings for verification
epochs: 3
train_batch_size: 4096
eval_batch_size: 512
stopping_step: 3
eval_step: 1
learner: adam
learning_rate: 0.001
neg_sampling: ~

use_gpu: true
seed: 42
reproducibility: True
show_progress: True
log_wandb: False
