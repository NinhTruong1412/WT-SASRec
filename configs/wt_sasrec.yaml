model: WTSASRec

hidden_size: 64
inner_size: 256
n_heads: 2
n_layers: 2
hidden_dropout_prob: 0.1
attn_dropout_prob: 0.1
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
MAX_ITEM_LIST_LENGTH: 50
loss_type: BPR

# Stability: gradient clipping to prevent exploding gradients
clip_grad_norm:
  max_norm: 5.0
  norm_type: 2
learning_rate: 0.0005
