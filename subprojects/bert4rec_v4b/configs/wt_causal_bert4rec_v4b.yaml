model: WTCausalBERT4RecV4b

hidden_size: 64
inner_size: 256
n_heads: 2
n_layers: 2
hidden_dropout_prob: 0.1
attn_dropout_prob: 0.1
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
MAX_ITEM_LIST_LENGTH: 50
mask_ratio: 0.2
ft_ratio: 0.5
transform: mask_itemseq
loss_type: CE
train_neg_sample_args: ~

wt_beta_init: 1.0
n_wt_quantiles: 8

clip_grad_norm:
  max_norm: 5.0
  norm_type: 2
